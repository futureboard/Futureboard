[alias]
# Build the full workspace as Community Edition.
build-ce = [
    "build",
    "--workspace",
    "--target-dir",
    "target/community",
]

# Build the Windows Exclusive Edition with ASIO.
build-exclusive-win = [
    "build",
    "--workspace",
    "--features",
    "futureboard_native/exclusive,sphere_directaudioengine/asio",
    "--target-dir",
    "target/exclusive",
]

# Check Community Edition in its isolated target directory.
check-ce = [
    "check",
    "--workspace",
    "--target-dir",
    "target/community",
]

# Check Windows Exclusive Edition in its isolated target directory.
check-exclusive-win = [
    "check",
    "--workspace",
    "--features",
    "futureboard_native/exclusive,sphere_directaudioengine/asio",
    "--target-dir",
    "target/exclusive",
]

# Community Edition quality gates (CI uses these).
clippy-ce = [
    "clippy",
    "--workspace",
    "--target-dir",
    "target/community",
]
test-ce = [
    "test",
    "--workspace",
    "--target-dir",
    "target/community",
]

# Cargo unifies features within one build graph, so each edition must use
# a separate target directory to avoid overwriting or reusing app artifacts.
# Aliases cannot chain commands, so cross-edition combos live in the xtask:
#   cargo xtask build-all [--release]   → build-ce, then build-exclusive-win
#   cargo xtask check-all               → check-ce, then check-exclusive-win
xtask = ["run", "--package", "xtask", "--"]

# Binary packaging / staging into `out/` (see xtask/README.md). These build the
# app and stage a clean runnable tree separate from the Cargo `target/` cache.
#   cargo package-dev         → out/dev/<platform>
#   cargo package-ce          → out/release/community/<platform>
#   cargo package-exclusive   → out/release/exclusive/<platform>
# The host target triple is used by default; pass `--target <triple>` to cross
# the mapping to another platform folder.
package-dev = [
    "run",
    "--package",
    "xtask",
    "--",
    "package",
    "--profile",
    "dev",
    "--edition",
    "community",
]
package-ce = [
    "run",
    "--package",
    "xtask",
    "--",
    "package",
    "--profile",
    "release",
    "--edition",
    "community",
]
package-exclusive = [
    "run",
    "--package",
    "xtask",
    "--",
    "package",
    "--profile",
    "release",
    "--edition",
    "exclusive",
]

[env]
# bindgen, used by asio-sys, loads libclang.dll from this directory.
LIBCLANG_PATH = { value = ".bin/bin", relative = true, force = false }

# cef-dll-sys reads CEF_PATH during compilation.
# relative = true anchors it at the workspace root.
CEF_PATH = { value = "build/cef", relative = true, force = false }
