name: Build Desktop

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Read Version
    runs-on: ubuntu-24.04
    outputs:
      app-version: ${{ steps.read.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: read
        run: |
          VERSION=$(node -p "require('./version.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

  build:
    name: Build Native (${{ matrix.os }})
    needs: version
    runs-on: ${{ matrix.os }}
    env:
      CARGO_BUILD_JOBS: 2
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            native-artifact-name: futureboard-native-linux
            native-bundle-glob: target/appimage/*.AppImage
          - os: macos-latest
            platform: mac
            native-artifact-name: futureboard-native-macos
            native-bundle-glob: packaging/native/out/*.dmg
          - os: windows-latest
            platform: win
            native-artifact-name: futureboard-native-win
            native-bundle-glob: target/installer/*.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Initialize submodules (audio SDKs + shared icons)
        shell: bash
        run: bash .github/workflows/submodules-init.sh

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential pkg-config libarchive-tools fakeroot rpm \
            libopenjp2-tools libasound2-dev \
            libgtk-4-dev libglib2.0-dev \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-render-util0-dev libxcb-composite0-dev \
            libxi-dev libgl1-mesa-dev libfontconfig1-dev \
            libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Verify shared app assets
        shell: bash
        run: |
          set -euo pipefail
          for f in \
            packages/shared/app/icons/app.png \
            packages/shared/app/icons/icon.ico \
            packages/shared/app/icons/icon.icns \
            packages/shared/app/windows/app.rc \
            packages/shared/app/windows/app.manifest; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done
          echo "Shared app assets OK"

      - name: Build workspace (Community Edition, release)
        run: cargo build-ce --release

      - name: Bundle native app (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          bash packaging/native/bundle-macos.sh
          bash packaging/native/bundle-macos-dmg.sh "packaging/native/out/Futureboard Studio.app" packaging/native/out "${{ needs.version.outputs.app-version }}"

      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./packaging/windows/build-installer.ps1 -AppVersion "${{ needs.version.outputs.app-version }}"

      # Bare `version.json` version (no nightly suffix here — this workflow
      # only runs on tagged releases), matching the AUR PKGBUILD's `pkgver`
      # so its hardcoded AppImage filename resolves against this release.
      - name: Build AppImage (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: bash packaging/linux/bundle-appimage.sh

      # Every workspace member's binaries/libraries land directly in
      # `target/community/release/` (dependency artifacts stay under `deps/`),
      # so a per-OS filter here is enough to grab "all" of them without needing
      # to enumerate crate/bin names as they're added or removed:
      #   win:   *.exe + *.dll
      #   linux: extension-less executables + *.so
      #   mac:   extension-less executables + *.dylib
      - name: Stage release binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-native
          case "${{ matrix.platform }}" in
            win)
              cp target/community/release/*.exe dist-native/
              cp target/community/release/*.dll dist-native/
              ;;
            linux)
              find target/community/release -maxdepth 1 -type f -perm -111 ! -name "*.*" -exec cp {} dist-native/ \;
              cp target/community/release/*.so dist-native/
              ;;
            mac)
              find target/community/release -maxdepth 1 -type f -perm -111 ! -name "*.*" -exec cp {} dist-native/ \;
              cp target/community/release/*.dylib dist-native/
              ;;
          esac
          # The workspace task runner is a dev tool, not a runtime binary.
          rm -f dist-native/xtask dist-native/xtask.exe
          echo "Staged native binaries:"
          ls -la dist-native/

      - name: Compress release binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-native-archives
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            pwsh -NoProfile -Command "Compress-Archive -Path 'dist-native/*' -DestinationPath 'dist-native-archives/${{ matrix.native-artifact-name }}-binaries.zip' -Force"
          else
            tar -czf "dist-native-archives/${{ matrix.native-artifact-name }}-binaries.tar.gz" -C dist-native .
          fi
          ls -lh dist-native-archives/

      - name: Upload native binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.native-artifact-name }}-binaries
          path: dist-native-archives/*
          if-no-files-found: error
          retention-days: 7

      - name: Upload native bundle artifact
        if: matrix.native-bundle-glob != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.native-artifact-name }}-bundle
          path: ${{ matrix.native-bundle-glob }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    needs: [version, build]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Futureboard Studio v${{ needs.version.outputs.app-version }}"
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update AUR PKGBUILD version
        run: |
          VERSION="${{ needs.version.outputs.app-version }}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/aur/PKGBUILD
          sed -i "s/^pkgver = .*/pkgver = ${VERSION}/" packaging/aur/.SRCINFO
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/aur/PKGBUILD packaging/aur/.SRCINFO
          git diff --cached --quiet || git commit -m "chore: bump AUR pkgver to ${VERSION} [skip ci]"
          git push
