name: Build Desktop

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Read Version
    runs-on: ubuntu-24.04
    outputs:
      app-version: ${{ steps.read.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: read
        run: |
          VERSION=$(node -p "require('./version.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

  build:
    name: Build Native (${{ matrix.os }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            native-bin: target/release/FutureboardNative.exe
            native-artifact-name: futureboard-native-win
            native-bundle-glob: packaging/native/out/win/**/*
          - os: macos-latest
            platform: mac
            native-bin: target/release/FutureboardNative
            native-artifact-name: futureboard-native-mac
            native-bundle-glob: packaging/native/out/**
          - os: ubuntu-24.04
            platform: linux
            native-bin: target/release/FutureboardNative
            native-artifact-name: futureboard-native-linux
            native-bundle-glob: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize submodules (audio SDKs + shared icons)
        run: bash .github/workflows/submodules-init.sh

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential pkg-config libarchive-tools fakeroot rpm \
            libopenjp2-tools libasound2-dev \
            libgtk-4-dev libglib2.0-dev \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-render-util0-dev libxcb-composite0-dev \
            libxi-dev libgl1-mesa-dev libfontconfig1-dev \
            libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Verify shared app assets
        shell: bash
        run: |
          set -euo pipefail
          for f in apps/shared/app.png apps/shared/icon.ico apps/shared/icon.icns apps/shared/app.rc apps/shared/app.manifest; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done
          echo "Shared app assets OK"

      - name: Build native app (futureboard_native)
        run: cargo build --release -p futureboard_native

      - name: Bundle native app (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          bash packaging/native/bundle-macos.sh
          bash packaging/native/bundle-macos-dmg.sh

      - name: Bundle native app (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./packaging/native/bundle-windows.ps1

      - name: Upload native app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.native-artifact-name }}
          path: ${{ matrix.native-bin }}
          if-no-files-found: error
          retention-days: 7

      - name: Upload native bundle artifact
        if: matrix.native-bundle-glob != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.native-artifact-name }}-bundle
          path: ${{ matrix.native-bundle-glob }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    needs: [version, build]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Futureboard Studio v${{ needs.version.outputs.app-version }}"
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update AUR PKGBUILD version
        run: |
          VERSION="${{ needs.version.outputs.app-version }}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/aur/PKGBUILD
          sed -i "s/^pkgver = .*/pkgver = ${VERSION}/" packaging/aur/.SRCINFO
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/aur/PKGBUILD packaging/aur/.SRCINFO
          git diff --cached --quiet || git commit -m "chore: bump AUR pkgver to ${VERSION} [skip ci]"
          git push
