name: Build Desktop

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version:
    name: Read Version
    runs-on: ubuntu-24.04
    outputs:
      app-version: ${{ steps.read.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: read
        run: |
          VERSION=$(node -p "require('./apps/electron/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

  build:
    name: Build (${{ matrix.os }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact-name: futureboard-win
            artifact-glob: apps/electron/release/*.exe
            artifact-glob2: ""
            updater-yml: apps/electron/release/latest.yml
          - os: macos-latest
            platform: mac
            artifact-name: futureboard-mac
            artifact-glob: apps/electron/release/*.dmg
            artifact-glob2: ""
            updater-yml: apps/electron/release/latest-mac.yml
          - os: ubuntu-24.04
            platform: linux
            artifact-name: futureboard-linux
            artifact-glob: apps/electron/release/*.AppImage
            artifact-glob2: apps/electron/release/*.deb
            updater-yml: apps/electron/release/latest-linux.yml

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize audio plugin SDK submodules without docs
        run: |
          git submodule sync -- external/vst3sdk external/clap external/clap-helpers external/yoga packages/shared/tabler-icons
          git submodule update --init --force --depth=1 --checkout -- external/clap external/clap-helpers external/yoga packages/shared/tabler-icons
          git submodule update --init --force --checkout -- external/vst3sdk
          git -C external/vst3sdk submodule update --init --force --checkout -- base cmake pluginterfaces public.sdk tutorials vstgui4

      - name: Download vswhere.exe and detect Visual Studio (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .bin | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/microsoft/vswhere/releases/latest/download/vswhere.exe" `
            -OutFile ".bin\vswhere.exe"
          Write-Host "vswhere version: $(& '.bin\vswhere.exe' -version)"
          $install  = & ".bin\vswhere.exe" -latest -property installationPath
          $instance = & ".bin\vswhere.exe" -latest -property instanceId
          $version  = & ".bin\vswhere.exe" -latest -property installationVersion
          if (-not $install) { Write-Error "No Visual Studio installation found"; exit 1 }
          Write-Host "VS installationPath:    $install"
          Write-Host "VS instanceId:          $instance"
          Write-Host "VS installationVersion: $version"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock', 'extentions/template/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential pkg-config libarchive-tools fakeroot rpm \
            libopenjp2-tools libasound2-dev \
            libgtk-4-dev libglib2.0-dev

      - name: Setup Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frameworks/SphereWebAudioCore/target
            frameworks/SphereAudioPlugins/target
            frameworks/SphereDirectAudioEngine/target
            frameworks/SpherePluginHost/target
            extentions/template/target
          key: cargo-${{ runner.os }}-${{ hashFiles('frameworks/SphereWebAudioCore/Cargo.lock', 'frameworks/SphereAudioPlugins/Cargo.lock', 'frameworks/SphereDirectAudioEngine/Cargo.lock', 'frameworks/SpherePluginHost/Cargo.lock', 'extentions/template/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM (SphereWebAudioCore)
        run: bun run --cwd apps/web build:audio:wasm

      - name: Check audio plugin framework
        run: |
          cargo check --manifest-path frameworks/SphereAudioPlugins/Cargo.toml
          cargo check --manifest-path extentions/template/Cargo.toml
          bun install --cwd extentions/template
          bun run --cwd extentions/template typecheck

      - name: Generate .icns app icon (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          set -euo pipefail
          src="apps/electron/icons/app.png"
          iconset="apps/electron/icons/AppIcon.iconset"
          out="apps/electron/icons/icon.icns"
          mkdir -p "$iconset"
          for size in 16 32 128 256 512; do
            sips -z $size $size "$src" --out "$iconset/icon_${size}x${size}.png"
            double=$((size * 2))
            sips -z $double $double "$src" --out "$iconset/icon_${size}x${size}@2x.png"
          done
          iconutil --convert icns "$iconset" --output "$out"
          rm -rf "$iconset"
          echo "Generated $out"

      - name: Build & package (${{ matrix.platform }})
        run: bun run dist:electron:${{ matrix.platform }}
        env:
          # Disable cert auto-discovery on all platforms
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Windows Authenticode signing — only relevant on win runner
          CSC_LINK: ${{ matrix.platform == 'win' && secrets.WIN_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'win' && secrets.WIN_CSC_KEY_PASSWORD || '' }}
          # macOS notarization — only relevant on mac runner
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.artifact-glob }}
            ${{ matrix.artifact-glob2 }}
            ${{ matrix.updater-yml }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish Release
    needs: [version, build]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Futureboard Studio v${{ needs.version.outputs.app-version }}"
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update AUR PKGBUILD version
        run: |
          VERSION="${{ needs.version.outputs.app-version }}"
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" packaging/aur/PKGBUILD
          sed -i "s/^pkgver = .*/pkgver = ${VERSION}/" packaging/aur/.SRCINFO
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/aur/PKGBUILD packaging/aur/.SRCINFO
          git diff --cached --quiet || git commit -m "chore: bump AUR pkgver to ${VERSION} [skip ci]"
          git push
