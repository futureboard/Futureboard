name: CI

# Quality gates for the primary maintained surface (Rust/GPUI native) plus the
# secondary web surface. Build/packaging of release artifacts lives in
# build-desktop.yml / daily-build.yml — this workflow only checks correctness.

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-fmt:
    name: Rust format
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  rust-clippy-test:
    name: Rust clippy + tests
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize submodules (audio SDKs + shared icons)
        run: bash .github/workflows/submodules-init.sh

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential pkg-config libarchive-tools fakeroot rpm \
            libopenjp2-tools libasound2-dev \
            libgtk-4-dev libglib2.0-dev \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-render-util0-dev libxcb-composite0-dev \
            libxi-dev libgl1-mesa-dev libfontconfig1-dev \
            libssl-dev

      - name: Setup Rust (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ci-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ci-cargo-${{ runner.os }}-

      - name: cargo clippy --workspace
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo clippy N-API addons
        run: |
          cargo clippy -p sphere-direct-audio-engine --lib --features napi -- -D warnings
          cargo clippy -p sphere-plugin-host --lib --features napi -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace

  web:
    name: Web WASM build + typecheck + lint
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize submodules
        run: bash .github/workflows/submodules-init.sh

      - name: Setup Rust for WebAudio WASM
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust + wasm-pack
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/wasm-pack
            target
          key: ci-web-wasm-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ci-web-wasm-${{ runner.os }}-

      - name: Install wasm-pack
        run: |
          if ! command -v wasm-pack >/dev/null 2>&1; then
            cargo install wasm-pack --locked
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS workspace dependencies
        run: bun install --frozen-lockfile

      - name: Build WebAudio WASM
        run: bun run --cwd apps/web build:audio:wasm

      - name: Typecheck web app
        run: bun run --cwd apps/web typecheck

      - name: Lint web app
        run: bun run --cwd apps/web lint
