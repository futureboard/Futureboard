name: CI

# Quality gates for the maintained desktop surface (Rust/GPUI native + audio
# engine + plugin host), built as the Community Edition via the *-ce cargo
# aliases in .cargo/config.toml (target/community). Build/packaging of release
# artifacts lives in build-desktop.yml / daily-build.yml — this workflow only
# checks correctness, on all three desktop targets (Windows / macOS / Linux).

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-fmt:
    name: Rust format (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Format does not need submodule contents, but keep .gitmodules
          # available for path-aware tooling.
          fetch-depth: 1

      - name: Setup Rust (rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: cargo fmt --all --check
        run: cargo fmt --all --check

  rust-clippy-test:
    name: Rust clippy + tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO_BUILD_JOBS: 2
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, windows-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Submodules are pulled explicitly below (shallow + selective) so we
          # do not pay for a full recursive clone of VST3 docs/history.
          submodules: false

      - name: Initialize submodules (audio SDKs + shared icons)
        shell: bash
        run: bash .github/workflows/submodules-init.sh

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential pkg-config libarchive-tools fakeroot rpm \
            libopenjp2-tools libasound2-dev \
            libgtk-4-dev libglib2.0-dev \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-render-util0-dev libxcb-composite0-dev \
            libxi-dev libgl1-mesa-dev libfontconfig1-dev \
            libssl-dev

      # coreaudio-sys / bindgen need a discoverable libclang on macOS runners.
      - name: Install macOS libclang (bindgen)
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Setup Rust (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Rust dependencies and CEF
        id: ci-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            build/cef
          key: ci-v2-cargo-cef-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ci-v2-cargo-cef-${{ runner.os }}-

      - name: Configure versioned CEF path
        shell: bash
        run: bash .github/workflows/set-cef-path.sh

      - name: Install pinned CEF SDK and runtime
        if: hashFiles('build/cef/150.0.11/**/archive.json') == ''
        run: cargo run -p SphereWebView --example install_cef --features installer

      - name: Install built-in plugin editor dependencies
        run: |
          bun install --frozen-lockfile
          bun install --cwd crates/BuiltinAudioPlugins/crates/equz8/editor --frozen-lockfile

      - name: Build embedded built-in plugin editors
        run: bun run build:plugin-editors

      - name: cargo clippy (Community Edition)
        run: cargo clippy-ce --all-targets -- -D warnings

      - name: cargo test (Community Edition)
        run: cargo test-ce
