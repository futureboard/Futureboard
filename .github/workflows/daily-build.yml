name: Daily Build

on:
  schedule:
    - cron: "0 5 * * *" # 12:00 PM Asia/Bangkok every day
  workflow_dispatch:

concurrency:
  group: daily-build
  cancel-in-progress: true

jobs:
  version:
    name: Read Version
    runs-on: ubuntu-24.04
    outputs:
      app-version: ${{ steps.read.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: read
        run: |
          BASE=$(node -p "require('./version.json').version")
          COMMIT="${GITHUB_SHA::7}"
          VERSION="${BASE}-alpha+${COMMIT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "App version: ${VERSION}"

  build_native:
    name: Build Native (${{ matrix.os }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            native-artifact-name: futureboard-native-win
            native-bundle-glob: target/installer/*.exe
          - os: ubuntu-24.04
            platform: linux
            native-artifact-name: futureboard-native-linux
            native-bundle-glob: target/appimage/*.AppImage
          - os: macos-latest
            platform: mac
            native-artifact-name: futureboard-native-mac
            native-bundle-glob: packaging/native/out/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false

      - name: Initialize submodules (audio SDKs + shared icons)
        shell: bash
        run: bash .github/workflows/submodules-init.sh

      - name: Sync nightly version
        run: |
          node scripts/sync-version.mjs --version "${{ needs.version.outputs.app-version }}"
          node scripts/sync-version.mjs --version "${{ needs.version.outputs.app-version }}" --check

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential pkg-config libarchive-tools fakeroot rpm \
            libopenjp2-tools libasound2-dev \
            libgtk-4-dev libglib2.0-dev \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-render-util0-dev libxcb-composite0-dev \
            libxi-dev libgl1-mesa-dev libfontconfig1-dev \
            libssl-dev

      - name: Install macOS libclang (bindgen)
        if: matrix.os == 'macos-latest'
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Rust dependencies and CEF
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            build/cef
          key: daily-v2-cargo-cef-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            daily-v2-cargo-cef-${{ runner.os }}-

      - name: Install pinned CEF SDK and runtime
        if: hashFiles('build/cef/archive.json') == ''
        run: cargo run -p SphereWebView --example install_cef --features installer

      - name: Install built-in plugin editor dependencies
        run: bun install --frozen-lockfile

      - name: Build embedded built-in plugin editors
        run: |
          bun run --cwd crates/BuiltinAudioPlugins/crates/meowsyn/editor build
          bun run --cwd crates/BuiltinAudioPlugins/crates/opensampler/editor build
          bun run --cwd crates/BuiltinAudioPlugins/crates/rodharerist/editorui build

      - name: Verify shared app assets
        shell: bash
        run: |
          set -euo pipefail
          for f in \
            packages/shared/app/icons/app.png \
            packages/shared/app/icons/icon.ico \
            packages/shared/app/icons/icon.icns \
            packages/shared/app/windows/app.rc \
            packages/shared/app/windows/app.manifest; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done
          echo "Shared app assets OK"

      - name: Package native runtime with xtask
        run: cargo run -p xtask -- package --profile release --edition community --plugin all

      - name: Resolve xtask package directory
        shell: bash
        run: |
          set -euo pipefail
          package_dir="$(find out/release/community -mindepth 1 -maxdepth 1 -type d -print -quit)"
          test -n "$package_dir" || { echo "xtask package directory not found"; exit 1; }
          test -f "$package_dir/build-info.json" || { echo "missing $package_dir/build-info.json"; exit 1; }
          echo "FUTUREBOARD_PACKAGE_DIR=$package_dir" >> "$GITHUB_ENV"
          echo "xtask package: $package_dir"

      - name: Bundle native app (macOS)
        if: matrix.platform == 'mac'
        run: |
          bash packaging/native/bundle-macos.sh "$FUTUREBOARD_PACKAGE_DIR" packaging/native/out
          bash packaging/native/bundle-macos-dmg.sh "packaging/native/out/Futureboard Studio.app" packaging/native/out "${{ needs.version.outputs.app-version }}"

      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./packaging/windows/build-installer.ps1 -AppVersion "${{ needs.version.outputs.app-version }}" -SourceDir $env:FUTUREBOARD_PACKAGE_DIR

      - name: Build AppImage (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: bash packaging/linux/bundle-appimage.sh "$FUTUREBOARD_PACKAGE_DIR" "$PWD/target/appimage" "${{ needs.version.outputs.app-version }}"

      - name: Archive xtask runtime package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-native-archives
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            pwsh -NoProfile -Command 'Compress-Archive -Path (Join-Path $env:FUTUREBOARD_PACKAGE_DIR "*") -DestinationPath "dist-native-archives/${{ matrix.native-artifact-name }}-runtime.zip" -Force'
          else
            tar -czf "dist-native-archives/${{ matrix.native-artifact-name }}-runtime.tar.gz" -C "$FUTUREBOARD_PACKAGE_DIR" .
          fi
          ls -lh dist-native-archives/

      - name: Upload native runtime artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.native-artifact-name }}-runtime
          path: dist-native-archives/*
          if-no-files-found: error
          retention-days: 3

      - name: Upload native bundle artifact
        if: matrix.native-bundle-glob != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.native-artifact-name }}-bundle
          path: ${{ matrix.native-bundle-glob }}
          if-no-files-found: error
          retention-days: 3

  publish:
    name: Publish Pre-Release
    needs: [version, build_native]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Delete previous nightly tag + release
        run: |
          gh release delete nightly --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Publish nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly v${{ needs.version.outputs.app-version }} #${{ github.run_number }}"
          body: |
            **Automated daily build** from `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            App version: `${{ needs.version.outputs.app-version }}`

            > Pre-release snapshot — may be unstable, not for production use.
          files: dist/*
          prerelease: true
          draft: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
