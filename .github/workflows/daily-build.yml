name: Daily Build

on:
  schedule:
    - cron: "0 5 * * *" # 12:00 PM Asia/Bangkok every day
  workflow_dispatch:

concurrency:
  group: daily-build
  cancel-in-progress: true

jobs:
  version:
    name: Read Version
    runs-on: ubuntu-24.04
    outputs:
      app-version: ${{ steps.read.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: read
        run: |
          BASE=$(node -p "require('./version.json').version")
          COMMIT="${GITHUB_SHA::7}"
          VERSION="${BASE}-alpha+${COMMIT}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "App version: ${VERSION}"

  build_native:
    name: Build Native (${{ matrix.os }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            native-artifact-name: futureboard-native-win
            native-bundle-glob: target/installer/*.exe
          - os: ubuntu-24.04
            platform: linux
            native-artifact-name: futureboard-native-linux
            native-bundle-glob: target/appimage/*.AppImage
          - os: macos-latest
            platform: mac
            native-artifact-name: futureboard-native-mac
            native-bundle-glob: packaging/native/out/*.dmg

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize submodules (audio SDKs + shared icons)
        run: bash .github/workflows/submodules-init.sh

      - name: Sync nightly version
        run: |
          node scripts/sync-version.mjs --version "${{ needs.version.outputs.app-version }}"
          node scripts/sync-version.mjs --version "${{ needs.version.outputs.app-version }}" --check

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential pkg-config libarchive-tools fakeroot rpm \
            libopenjp2-tools libasound2-dev \
            libgtk-4-dev libglib2.0-dev \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-render-util0-dev libxcb-composite0-dev \
            libxi-dev libgl1-mesa-dev libfontconfig1-dev \
            libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Verify shared app assets
        shell: bash
        run: |
          set -euo pipefail
          for f in \
            packages/shared/app/icons/app.png \
            packages/shared/app/icons/icon.ico \
            packages/shared/app/icons/icon.icns \
            packages/shared/app/windows/app.rc \
            packages/shared/app/windows/app.manifest; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done
          echo "Shared app assets OK"

      - name: Build workspace (release)
        run: cargo build --release --workspace

      - name: Bundle native app (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          bash packaging/native/bundle-macos.sh
          bash packaging/native/bundle-macos-dmg.sh "packaging/native/out/Futureboard Studio.app" packaging/native/out "${{ needs.version.outputs.app-version }}"

      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y --no-progress

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./packaging/windows/build-installer.ps1 -AppVersion "${{ needs.version.outputs.app-version }}"

      - name: Build AppImage (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: bash packaging/linux/bundle-appimage.sh "$PWD/target/release/FutureboardNative" "$PWD/target/appimage" "${{ needs.version.outputs.app-version }}"

      # Every workspace member's binaries/libraries land directly in
      # `target/release/` (dependency artifacts stay under `deps/`), so a
      # per-OS filter here is enough to grab "all" of them without needing to
      # enumerate crate/bin names as they're added or removed:
      #   win:   *.exe + *.dll
      #   linux: extension-less executables + *.so
      #   mac:   extension-less executables + *.dylib
      - name: Stage release binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-native
          case "${{ matrix.platform }}" in
            win)
              cp target/release/*.exe dist-native/
              cp target/release/*.dll dist-native/
              ;;
            linux)
              find target/release -maxdepth 1 -type f -perm -111 ! -name "*.*" -exec cp {} dist-native/ \;
              cp target/release/*.so dist-native/
              ;;
            mac)
              find target/release -maxdepth 1 -type f -perm -111 ! -name "*.*" -exec cp {} dist-native/ \;
              cp target/release/*.dylib dist-native/
              ;;
          esac
          echo "Staged native binaries:"
          ls -la dist-native/

      - name: Compress release binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-native-archives
          if [[ "${{ matrix.platform }}" == "win" ]]; then
            pwsh -NoProfile -Command "Compress-Archive -Path 'dist-native/*' -DestinationPath 'dist-native-archives/${{ matrix.native-artifact-name }}-binaries.zip' -Force"
          else
            tar -czf "dist-native-archives/${{ matrix.native-artifact-name }}-binaries.tar.gz" -C dist-native .
          fi
          ls -lh dist-native-archives/

      - name: Upload native binaries artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.native-artifact-name }}-binaries
          path: dist-native-archives/*
          if-no-files-found: error
          retention-days: 3

      - name: Upload native bundle artifact
        if: matrix.native-bundle-glob != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.native-artifact-name }}-bundle
          path: ${{ matrix.native-bundle-glob }}
          if-no-files-found: error
          retention-days: 3

  publish:
    name: Publish Pre-Release
    needs: [version, build_native]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Delete previous nightly tag + release
        run: |
          gh release delete nightly --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Publish nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly v${{ needs.version.outputs.app-version }} #${{ github.run_number }}"
          body: |
            **Automated daily build** from `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            App version: `${{ needs.version.outputs.app-version }}`

            > Pre-release snapshot — may be unstable, not for production use.
          files: dist/*
          prerelease: true
          draft: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
