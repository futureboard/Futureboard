name: Daily Build

on:
  schedule:
    - cron: "0 5 * * *" # 12:00 PM Asia/Bangkok every day
  workflow_dispatch:

concurrency:
  group: daily-build
  cancel-in-progress: true

jobs:
  version:
    name: Read Version
    runs-on: ubuntu-24.04
    outputs:
      app-version: ${{ steps.read.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: read
        run: |
          VERSION=$(node -p "require('./version.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "App version: $VERSION"

  build_native:
    name: Build Native (${{ matrix.os }})
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            native-bin: target/release/futureboard_native.exe
            native-artifact-name: futureboard-native-win
            native-bundle-glob: packaging/native/out/win/**/*
          - os: macos-latest
            platform: mac
            native-bin: target/release/futureboard_native
            native-artifact-name: futureboard-native-mac
            native-bundle-glob: packaging/native/out/**
          - os: ubuntu-24.04
            platform: linux
            native-bin: target/release/futureboard_native
            native-artifact-name: futureboard-native-linux
            native-bundle-glob: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize submodules (audio SDKs + shared icons)
        run: bash .github/workflows/submodules-init.sh

      - name: Sync versions
        run: |
          node scripts/sync-version.mjs
          node scripts/sync-version.mjs --check

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential pkg-config libarchive-tools fakeroot rpm \
            libopenjp2-tools libasound2-dev \
            libgtk-4-dev libglib2.0-dev \
            libx11-dev libxkbcommon-dev libxkbcommon-x11-dev \
            libxcb1-dev libxcb-xfixes0-dev libxcb-shape0-dev \
            libxcb-render-util0-dev libxcb-composite0-dev \
            libxi-dev libgl1-mesa-dev libfontconfig1-dev \
            libssl-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Verify shared app assets
        shell: bash
        run: |
          set -euo pipefail
          for f in apps/shared/app.png apps/shared/icon.ico apps/shared/icon.icns apps/shared/app.rc apps/shared/app.manifest; do
            test -f "$f" || { echo "missing $f"; exit 1; }
          done
          echo "Shared app assets OK"

      - name: Build native app (futureboard_native)
        run: cargo build --release -p futureboard_native

      - name: Bundle native app (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          bash packaging/native/bundle-macos.sh
          bash packaging/native/bundle-macos-dmg.sh

      - name: Bundle native app (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./packaging/native/bundle-windows.ps1

      - name: Upload native app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.native-artifact-name }}
          path: ${{ matrix.native-bin }}
          if-no-files-found: error
          retention-days: 3

      - name: Upload native bundle artifact
        if: matrix.native-bundle-glob != ''
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.native-artifact-name }}-bundle
          path: ${{ matrix.native-bundle-glob }}
          if-no-files-found: error
          retention-days: 3

  publish:
    name: Publish Pre-Release
    needs: [version, build_native]
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release assets
        run: ls -lh dist/

      - name: Delete previous nightly tag + release
        run: |
          gh release delete nightly --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

      - name: Publish nightly pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly v${{ needs.version.outputs.app-version }} #${{ github.run_number }}"
          body: |
            **Automated daily build** from `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
            App version: `${{ needs.version.outputs.app-version }}`

            > Pre-release snapshot — may be unstable, not for production use.
          files: dist/*
          prerelease: true
          draft: false
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
