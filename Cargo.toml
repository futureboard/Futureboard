[workspace]
resolver = "3"
members = [
    "apps/native",
    "crates/*",
]
exclude = [
    # Vendored gpui: a self-contained nested workspace under crates/gpui (it
    # carries its own [workspace] and resolves its internals against the
    # published `-gpui-standalone` crates). Excluded here so it is consumed
    # purely as a path dependency rather than claimed as a root member (a crate
    # cannot be both a workspace root and a member of another workspace).
    "crates/gpui",
    # JS/Rust extension templates — built independently, not part of the workspace.
    "extensions",
    "extensions/template",
    "extensions/template-react",
    "extensions/template-vue",
    # Quarantined experimental/placeholder crates (no implementation yet).
    # See ARCHITECTURE.md → "Experimental crates policy". Promote back into the
    # workspace by removing the corresponding line once a crate has real content.
    "crates/SphereExtensionHost",
    "crates/SphereMediaUtils",
    "crates/SphereNoiseRemover",
    "crates/SphereSettings",
    "crates/SphereStemExtractor",
]

[workspace.package]
version = "0.1.0"
edition = "2024"
publish = false

[workspace.dependencies]
sphere_ui_components = { path = "crates/SphereUIComponents" }
sphere-direct-audio-engine = { path = "crates/SphereDirectAudioEngine", default-features = false }
sphere-audio-editor = { path = "crates/SphereAudioEditor" }
sphere-audio-plugins = { path = "crates/SphereAudioPlugins" }
sphere-encoder = { path = "crates/SphereEncoder" }
