<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100vw; height: 100vh; overflow: hidden; background: transparent; }
  body { display: grid; place-items: center; }
  img {
    display: block;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    user-select: none;
    -webkit-user-drag: none;
  }
</style>
</head>
<body>
<img src="./splash.png" draggable="false" />
</body>
</html>
