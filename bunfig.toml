# Bun workspace configuration — Futureboard Studio

[install]
peer     = true   # auto-install peer dependencies
optional = false  # skip optional packages (keeps installs lean)
exact    = false  # allow semver ranges; lockfile pins the real versions
dev      = true   # always include devDependencies

[install.cache]
dir     = "~/.bun/install/cache"
disable = false

[install.lockfile]
# Print a diff to stdout when the lockfile changes
print = "bun"
# In CI, set BUN_CONFIG_FROZEN_LOCKFILE=true to fail on any lockfile drift
# frozenLockfile = false

[run]
# Use bun as the interpreter for inline scripts (#!/usr/bin/env bun)
bun = true

[test]
# Per-test timeout in milliseconds
timeout  = 10000
coverage = false
# Workspace packages that provide test utilities can be preloaded here:
# preload = ["packages/test-utils/setup.ts"]
