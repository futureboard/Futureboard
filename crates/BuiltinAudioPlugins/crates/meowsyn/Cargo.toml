[package]
name = "meowsyn"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "MeowSyn — polyphonic soft-synth DSP core (fundsp)"

[lib]
name = "meowsyn"
# `rlib` for the umbrella crate / tests; `cdylib` so it also compiles as a
# Built-in Plugin dynamic library (C entry points are a later slice).
crate-type = ["rlib", "cdylib"]

[dependencies]
builtin-dsp-core.workspace = true
fundsp = { workspace = true, default-features = false }

[lints]
workspace = true
