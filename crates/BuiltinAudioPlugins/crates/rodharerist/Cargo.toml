[package]
name = "rodharerist"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Rodhareist — flagship guitar multi-effect DSP core"

[lib]
name = "rodharerist"
# `rlib` for workspace unit tests; `cdylib` for the eventual Built-in Plugin
# dynamic library (C entry points + embedded editor UI are a later slice).
crate-type = ["rlib", "cdylib"]

[dependencies]
biquad.workspace = true
builtin-dsp-core.workspace = true
builtin-ui-embed.workspace = true
nam-rs.workspace = true

[build-dependencies]
# Build-time only: turns `editorui/dist` into the embedded asset table.
#
# This must stay pointed at the dependency-free `builtin_ui_embed`, never at the
# `BuiltinAudioPlugins` umbrella: a build-dependency is a separate build unit,
# and pulling the umbrella in here rebuilt all eight plugin `cdylib`s a second
# time into the same `.dll` paths, causing intermittent LNK1104 link races.
builtin-ui-embed = { workspace = true, features = ["generate"] }

[lints]
workspace = true
