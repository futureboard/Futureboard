[package]
name = "sphere_ui_components"
version = "0.1.0"
edition = "2021"
autobins = false

[lib]
name = "sphere_ui_components"
path = "src/lib.rs"

[dependencies]
gpui = "0.2.2"
sphere-direct-audio-engine = { path = "../SphereDirectAudioEngine" }
# Audio decoding for waveform preview only (not realtime playback).
hound = "3.5"
symphonia = { version = "0.5", default-features = false, features = ["mp3"] }
# Cross-platform user directories for the file browser default location.
dirs = "5"
# Menu manifest is shared with Electron/Web via a generated JSON file.
serde = { version = "1", features = ["derive"] }
serde_json = "1"
