[package]
name = "gpui_windows"
version = "0.1.0"
edition.workspace = true
publish.workspace = true
license = "Apache-2.0"

[lints]
workspace = true

[lib]
path = "src/gpui_windows.rs"

[features]
default = ["gpui/default"]
test-support = ["gpui/test-support"]
screen-capture = ["gpui/screen-capture", "scap"]

[dependencies]
# default-features = false: the windows backend only needs gpui core. Pulling
# gpui's default feature set here would force-enable `windows-manifest`, which
# embeds an application manifest and collides (CVT1100) with binaries that ship
# their own manifest (e.g. apps/native via app.rc). Consumers that want gpui's
# manifest can still enable it through their own gpui dependency, or via this
# crate's `default` feature.
#
# Declared directly (not `workspace = true`) because Cargo forbids overriding an
# inherited dependency's `default-features`; the nested workspace dep defaults it
# to true. `../..` points at the gpui crate root (crates/gpui).
gpui = { path = "../..", default-features = false }

[target.'cfg(target_os = "windows")'.dependencies]
accesskit.workspace = true
accesskit_windows.workspace = true
anyhow.workspace = true
collections.workspace = true
etagere = "0.2"
futures.workspace = true
image.workspace = true
itertools.workspace = true
log.workspace = true
parking_lot.workspace = true
rand.workspace = true
raw-window-handle = "0.6"
smallvec.workspace = true
util.workspace = true
gpui_util.workspace = true
uuid.workspace = true
windows.workspace = true
windows-core.workspace = true
windows-numerics = "0.3"
windows-registry = "0.5"

[target.'cfg(target_os = "windows")'.dependencies.scap]
workspace = true
optional = true

[target.'cfg(target_os = "windows")'.build-dependencies]
windows-registry = "0.5"
